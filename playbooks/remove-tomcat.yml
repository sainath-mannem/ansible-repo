---
- name: Remove Apache Tomcat
  hosts: nodes
  become: yes

  vars_files:
    - vars/tomcat.yml

  tasks:

    - name: Stop Tomcat
      shell: "{{ tomcat_home }}/bin/shutdown.sh"
      ignore_errors: yes

    - name: Remove Tomcat installation directory
      file:
        path: "{{ tomcat_home }}"
        state: absent

    - name: Remove downloaded Tomcat archive
      file:
        path: /tmp/apache-tomcat.tar.gz
        state: absent

    - name: Remove Tomcat user
      user:
        name: "{{ tomcat_user }}"
        state: absent
        remove: yes
      ignore_errors: yes

    - name: Verify Tomcat directory removed
      stat:
        path: "{{ tomcat_home }}"
      register: tomcat_dir

    - name: Display result
      debug:
        msg: "Tomcat has been removed successfully."
      when: not tomcat_dir.stat.exists