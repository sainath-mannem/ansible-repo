---
- name: Install Apache Tomcat
  hosts: node1
  become: yes

  tasks:

    - name: Create Tomcat user
      user:
        name: "{{ tomcat_user }}"
        shell: /bin/false
        system: yes


    - name: Create Tomcat directory
      file:
        path: "{{ tomcat_home }}"
        state: directory
        owner: "{{ tomcat_user }}"
        group: "{{ tomcat_user }}"


    - name: Download Tomcat
      get_url:
        url: "https://dlcdn.apache.org/tomcat/tomcat-10/v{{ tomcat_version }}/bin/apache-tomcat-{{ tomcat_version }}.tar.gz"
        dest: /tmp/apache-tomcat.tar.gz


    - name: Extract Tomcat
      unarchive:
        src: /tmp/apache-tomcat.tar.gz
        dest: "{{ tomcat_home }}"
        remote_src: yes
        extra_opts:
          - --strip-components=1


    - name: Create Tomcat systemd service
      template:
        src: tomcat.service.j2
        dest: /etc/systemd/system/tomcat.service


    - name: Reload systemd
      systemd:
        daemon_reload: yes


    - name: Start Tomcat
      systemd:
        name: tomcat
        state: started
        enabled: yes