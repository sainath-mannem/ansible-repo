---
- name: Install Apache Tomcat
  hosts: node1
  become: yes

  vars_files:
    - vars/tomcat.yml

  tasks:

    - name: Create Tomcat user
      user:
        name: "{{ tomcat_user }}"
        shell: /bin/false
        system: yes

    - name: Create Tomcat directory
      file:
        path: "{{ tomcat_home }}"
        state: directory
        owner: "{{ tomcat_user }}"
        group: "{{ tomcat_user }}"
        mode: '0755'

    - name: Download Tomcat
      get_url:
        url: "https://dlcdn.apache.org/tomcat/tomcat-10/v{{ tomcat_version }}/bin/apache-tomcat-{{ tomcat_version }}.tar.gz"
        dest: /tmp/apache-tomcat.tar.gz

    - name: Extract Tomcat
      unarchive:
        src: /tmp/apache-tomcat.tar.gz
        dest: "{{ tomcat_home }}"
        remote_src: yes
        extra_opts:
          - --strip-components=1

    - name: Set ownership on Tomcat directory
      file:
        path: "{{ tomcat_home }}"
        owner: "{{ tomcat_user }}"
        group: "{{ tomcat_user }}"
        recurse: yes

    - name: Make Tomcat scripts executable
      file:
        path: "{{ tomcat_home }}/bin"
        mode: '0755'
        recurse: yes

    - name: Start Tomcat
      shell: "{{ tomcat_home }}/bin/startup.sh"
      environment:
        JAVA_HOME: "{{ java_home }}"